name: mavi_mobile
description: Ma:Vi Flutter chat client backed by FastAPI and SQLite.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^8.0.5
  http: ^1.2.1
  web_socket_channel: ^3.0.0

dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.24

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
