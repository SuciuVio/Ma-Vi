name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "mobile_flutter/**"
      - "mavi_backend/**"
      - ".github/workflows/flutter-apk.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MAVI_API_BASE: https://ma-vi.onrender.com

jobs:
  build-flutter-apk:
    name: Build Flutter debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project files
        working-directory: mobile_flutter
        run: flutter create . --platforms=android --org ro.mavi --project-name mavi_mobile

      - name: Install Android API 36
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"

      - name: Use Android API 36 for compile SDK
        working-directory: mobile_flutter
        run: |
          for file in android/app/build.gradle android/app/build.gradle.kts; do
            if [ -f "$file" ]; then
              sed -i -E 's/compileSdk[[:space:]]*=[[:space:]]*flutter\.compileSdkVersion/compileSdk = 36/g' "$file"
              sed -i -E 's/compileSdkVersion[[:space:]]+flutter\.compileSdkVersion/compileSdkVersion 36/g' "$file"
              sed -i -E 's/compileSdk[[:space:]]*=[[:space:]]*[0-9]+/compileSdk = 36/g' "$file"
              sed -i -E 's/compileSdkVersion[[:space:]]+[0-9]+/compileSdkVersion 36/g' "$file"
              sed -i -E 's/minSdk[[:space:]]*=[[:space:]]*flutter\.minSdkVersion/minSdk = 23/g' "$file"
              sed -i -E 's/minSdkVersion[[:space:]]+flutter\.minSdkVersion/minSdkVersion 23/g' "$file"
            fi
          done
          grep -R "compileSdk" -n android

      - name: Add Android audio permissions
        working-directory: mobile_flutter
        run: |
          manifest="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i\    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' "$manifest"
          sed -i '/<application/i\    <uses-permission android:name="android.permission.CHANGE_NETWORK_STATE" />' "$manifest"
          sed -i '/<application/i\    <uses-permission android:name="android.permission.RECORD_AUDIO" />' "$manifest"
          sed -i '/<application/i\    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' "$manifest"
          sed -i '/<application/i\    <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />' "$manifest"
          sed -i '/<application/i\    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />' "$manifest"
          cat "$manifest"

      - name: Install Flutter dependencies
        working-directory: mobile_flutter
        run: flutter pub get

      - name: Use Android API 36 for plugin compile SDK
        working-directory: mobile_flutter
        run: |
          for file in $(find "${PUB_CACHE:-$HOME/.pub-cache}" -path "*/android/build.gradle" -o -path "*/android/build.gradle.kts"); do
            sed -i -E 's/compileSdk[[:space:]]*=[[:space:]]*flutter\.compileSdkVersion/compileSdk = 36/g' "$file"
            sed -i -E 's/compileSdkVersion[[:space:]]+flutter\.compileSdkVersion/compileSdkVersion 36/g' "$file"
            sed -i -E 's/compileSdk[[:space:]]*=[[:space:]]*[0-9]+/compileSdk = 36/g' "$file"
            sed -i -E 's/compileSdkVersion[[:space:]]+[0-9]+/compileSdkVersion 36/g' "$file"
            sed -i -E 's/minSdk[[:space:]]*=[[:space:]]*flutter\.minSdkVersion/minSdk = 23/g' "$file"
            sed -i -E 's/minSdkVersion[[:space:]]+flutter\.minSdkVersion/minSdkVersion 23/g' "$file"
          done
          grep -R "compileSdk" -n "${PUB_CACHE:-$HOME/.pub-cache}/hosted" | head -80

      - name: Analyze Flutter project
        working-directory: mobile_flutter
        run: flutter analyze

      - name: Build debug APK
        working-directory: mobile_flutter
        run: flutter build apk --debug --dart-define=MAVI_API_BASE=${{ env.MAVI_API_BASE }}

      - name: Upload Flutter APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: mavi-flutter-debug-apk
          path: mobile_flutter/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
